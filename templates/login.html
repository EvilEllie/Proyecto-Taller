<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Rectificaciones Rio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo: #c0392b;
      --rojo-oscuro: #922b21;
      --negro: #0d0d0d;
      --gris-oscuro: #1a1a1a;
      --gris-medio: #2c2c2c;
      --gris-claro: #a0a0a0;
      --blanco: #f5f5f5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--negro);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* fondo con textura de rejilla */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,57,43,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,57,43,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-wrapper {
      display: flex;
      width: 860px;
      min-height: 480px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      position: relative;
      z-index: 1;
    }

    /* Panel izquierdo decorativo */
    .panel-left {
      flex: 1;
      background: linear-gradient(160deg, var(--rojo-oscuro), var(--negro));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 36px;
      position: relative;
      overflow: hidden;
    }

    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 40px solid rgba(255,255,255,0.04);
    }

    .panel-left::before {
      content: '';
      position: absolute;
      top: -40px;
      left: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 30px solid rgba(255,255,255,0.04);
    }

    .brand-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--blanco);
      letter-spacing: 3px;
      text-align: center;
      line-height: 1.1;
    }

    .brand-sub {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 10px;
      text-align: center;
    }

    .divider-v {
      width: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* Panel derecho: formulario */
    .panel-right {
      flex: 1.1;
      background: var(--gris-oscuro);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px;
    }

    .form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--blanco);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .form-subtitle {
      color: var(--gris-claro);
      font-size: 13px;
      margin-bottom: 36px;
    }

    .flash-msg {
      background: rgba(192,57,43,0.2);
      border-left: 3px solid var(--rojo);
      color: #e88;
      padding: 10px 14px;
      border-radius: 2px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gris-claro);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 13px 16px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--rojo);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 3px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: var(--rojo-oscuro); }
    .btn-login:active { transform: scale(0.98); }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 32px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="panel-left">
    <div class="brand-icon">🔧</div>
    <div class="brand-name">Rectificaciones<br>Rio</div>
    <div class="brand-sub">Sistema de Inventario</div>
  </div>

  <div class="divider-v"></div>

  <div class="panel-right">
    <div class="form-title">Iniciar Sesión</div>
    <div class="form-subtitle">Ingresa tus credenciales para continuar</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-msg">⚠ {{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Nombre de usuario" required autofocus>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="contrasena" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="footer-note">Refacciones Rio · Byte Builders © 2026</div>
  </div>
</div>

</body>
</html>
